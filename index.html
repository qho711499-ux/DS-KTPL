<head>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; max-width: 900px; margin: 0 auto; padding: 20px; background-color: #f4f7f6; color: #333; }
        .quiz-container { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-bottom: 30px; }
        .question { margin-bottom: 40px; background: #fafafa; padding: 20px; border-radius: 8px; border-left: 5px solid #3498db; }
        .question-title { font-weight: bold; font-size: 1.1em; color: #2c3e50; margin-bottom: 10px; }
        .context-text { font-size: 0.95em; color: #555; margin-bottom: 15px; font-style: italic; text-align: justify; }
        .option-group { margin: 10px 0; padding: 12px; border-radius: 6px; background: #fff; border: 1px solid #eee; transition: all 0.2s; }
        .option-group:hover { border-color: #bdc3c7; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .option-text { margin: 0 0 10px 0; font-weight: 500; }
        .radio-labels { display: flex; gap: 20px; margin-bottom: 5px; }
        .radio-labels label { cursor: pointer; }
        .result-msg { display: block; font-weight: bold; margin-top: 8px; display: none; padding: 8px; border-radius: 4px; }
        .correct { color: #155724; background-color: #d4edda; border: 1px solid #c3e6cb; }
        .incorrect { color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; }
        .explanation { font-weight: normal; color: #444; margin-top: 5px; display: block; border-top: 1px dashed rgba(0,0,0,0.1); padding-top: 5px; }
        button#submit-btn { display: block; width: 100%; background: #3498db; color: #fff; border: none; padding: 15px 20px; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; transition: background 0.3s; margin-top: 20px; }
        button#submit-btn:hover { background: #2980b9; }
        #score-display { margin-top: 25px; font-size: 1.5em; font-weight: bold; text-align: center; color: #e74c3c; background: #fdf2e9; padding: 15px; border-radius: 8px; display: none; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Ôn tập Trắc nghiệm Đúng/Sai</h1>
    <form id="quiz-form">
        <div id="questions-list"></div>
        <button type="button" id="submit-btn" onclick="calculateScore()">Nộp bài & Chấm điểm</button>
    </form>
    <div id="score-display"></div>
</div>

<script>
    const quizData = [
        {
            q: "Câu 1:",
            ctx: "Em đồng tình hay không đồng tình với ý kiến nào sau đây?",
            items: [
                { id: "1a", text: "a. Hiến pháp là luật có vị trí ngang bằng nhau như các luật khác.", ans: "S" },
                { id: "1b", text: "b. Học sinh cũng phải có trách nhiệm tuân thủ và bảo vệ Hiến pháp.", ans: "Đ" },
                { id: "1c", text: "c. Nếu các luật như dân sự, hành chính, hình sự, lao động,... có nội dung trái với Hiến pháp thì bắt buộc phải thay đổi Hiến pháp.", ans: "S" },
                { id: "1d", text: "d. Hiến pháp là công cụ bảo vệ quyền con người, quyền công dân.", ans: "Đ" }
            ]
        },
        {
            q: "Câu 2:",
            ctx: "Đối với nước ta, pháp luật trừng phạt nghiêm khắc các hành vi tước đoạt mạng sống của con người một cách tùy tiện; nghiêm cấm tra tấn nhục hình; chỉ áp dụng án tử hình với các loại tội đặc biệt nghiêm trọng nhất... Vì vậy, tỷ lệ đói nghèo và tỷ lệ tử vong bà mẹ và trẻ sơ sinh giảm rõ rệt. Hoặc, đối với quyền tự do tín ngưỡng, tôn giáo, Việt Nam đã xây dựng khuôn khổ pháp lý vững chắc về bảo đảm quyền này trong Hiến pháp năm 2013...",
            items: [
                { id: "2a", text: "a. Bộ luật hình sự không áp dụng hình phạt tử hình một số tội nêu trên chính là không tôn trọng quyền con người vì nó tạo bất bình đẳng về trách nhiệm pháp lý.", ans: "S" },
                { id: "2b", text: "b. Các quyền con người ghi nhận trong Hiến pháp được coi là nguyên tắc Hiến định.", ans: "Đ" },
                { id: "2c", text: "c. Quyền tự do tín ngưỡng tôn giáo là quyền cơ bản của con người trên lĩnh vực chính trị.", ans: "S" },
                { id: "2d", text: "d. Việc thực hiện các mục tiêu Thiên nhiên kỷ là góp phần thực hiện tốt quyền con người.", ans: "Đ" }
            ]
        },
        {
            q: "Câu 3:",
            ctx: "Kinh tế thị trường định hướng xã hội chủ nghĩa Việt Nam có nhiều hình thức sở hữu, nhiều thành phần kinh tế... Các thành phần kinh tế có vị trí, vai trò, chức năng khác nhau trong chỉnh thể nền kinh tế: Kinh tế nhà nước giữ vai trò chủ đạo; kinh tế tập thể, kinh tế hợp tác không ngừng được củng cố, phát triển; kinh tế tư nhân là động lực quan trọng của nền kinh tế; kinh tế có vốn đầu tư nước ngoài được khuyến khích phát triển...",
            items: [
                { id: "3a", text: "a. Việc Hiến pháp quy định kinh tế thị trường định hướng xã hội chủ nghĩa là phù hợp với bối cảnh toàn cầu hóa hiện nay.", ans: "Đ" },
                { id: "3b", text: "b. Việc quy định thành phần kinh tế nhà nước giữ vai trò chủ đạo là thể hiện sự ưu tiên đối với thành phần kinh tế này, làm giảm khả năng cạnh tranh giữa các thành phần kinh tế.", ans: "S" },
                { id: "3c", text: "c. Kinh tế thị trường phát triển sẽ tiến tới xóa bỏ các thành phần kinh tế khác chỉ còn kinh tế nhà nước là chủ thể kinh tế duy nhất.", ans: "S" },
                { id: "3d", text: "d. Hiến pháp là cơ sở pháp lý để các thành phần kinh tế cùng hợp tác và phát triển hướng tới mục tiêu chung.", ans: "Đ" }
            ]
        },
        {
            q: "Câu 4:",
            ctx: "Nhằm đánh giá kết quả thực hiện nhiệm vụ phát triển kinh tế - xã hội trên địa bàn huyện năm 2023... Chiều ngày 03 tháng 01 năm 2024 Ủy ban nhân dân huyện Vân Canh tổ chức hội nghị triển khai Nghị quyết của HĐND huyện về phát triển kinh tế - xã hội năm 2024.",
            items: [
                { id: "4a", text: "a. Hội đồng nhân dân huyện là cơ quan chấp hành của ủy ban nhân dân huyện.", ans: "S" },
                { id: "4b", text: "b. Nghị quyết của Hội đồng nhân dân huyện là văn bản quy phạm pháp luật.", ans: "Đ" },
                { id: "4c", text: "c. Hội đồng nhân dân là cơ quan trực tiếp thực hiện chức năng quản lý nhà nước các vấn đề ở địa phương.", ans: "S" },
                { id: "4d", text: "d. Ủy ban nhân dân huyện là cơ quan thực thi nhiệm vụ của Hội đồng nhân dân huyện.", ans: "Đ" }
            ]
        },
        {
            q: "Câu 5:",
            ctx: "Nhận được tin báo của quần chúng nhân dân về việc phát hiện có dấu hiệu vi phạm trong hoạt động chế biến thực phẩm tại nhà hàng X do bà H làm chủ... Trong quá trình thanh tra, cơ quan chức năng đã phát hiện bà H sử dụng một số thực phẩm không có nguồn gốc xuất xứ... dẫn đến anh M bị ngộ độc phải nhập viện. Ngay sau đó ông D đã tiến hành lập biên bản xử phạt và thu hồi giấy phép kinh doanh của bà H.",
            items: [
                { id: "5a", text: "a. Bà H không phải là chủ thể sản xuất nên không có nghĩa vụ phải chấp hành các quy định của pháp luật.", ans: "S" },
                { id: "5b", text: "b. Ông D đã làm tốt vai trò là chủ thể nhà nước trong việc quản lý nhà nước đối với hoạt động kinh doanh.", ans: "Đ" },
                { id: "5c", text: "c. Việc xử phạt của cơ quan chức năng thể hiện tính quy phạm phổ biến của pháp luật?", ans: "S" },
                { id: "5d", text: "d. Anh M có quyền khởi kiện để yêu cầu bà H phải bồi thường thiệt hại cho bản thân mình.", ans: "Đ" }
            ]
        },
        {
            q: "Câu 6:",
            ctx: "Kì họp thứ 15 của Hội đồng nhân dân thành phố X diễn ra từ ngày 6-7 đến 7-7 - 2020. Tại kì họp này, HĐND thành phố đã xem xét về tình hình thực hiện nhiệm vụ kinh tế - xã hội... lắng nghe Thường trực UBND báo cáo làm rõ một số nội dung cơ bản liên quan đến chính sách giải quyết việc làm...",
            items: [
                { id: "6a", text: "a) Kỳ họp là hình thức hoạt động duy nhất của Hội đồng nhân dân.", ans: "S", exp: "Ngoài kỳ họp thì hoạt động của Hội đồng nhân dân còn được thể hiện các hoạt động của các ban, các đại biểu... Kỳ họp chỉ là hình thức hoạt động quan trọng nhất." },
                { id: "6b", text: "b) Hội đồng nhân dân trình Ủy ban nhân dân ra nghị quyết các vấn đề quan trọng.", ans: "S", exp: "Ủy ban nhân dân là cơ quan chấp hành, có nhiệm vụ trình hội đồng nhân dân thông qua các nghị quyết để phát triển kinh tế." },
                { id: "6c", text: "c) Chấp hành nghị quyết của Hội đồng nhân dân tỉnh là trách nhiệm đương nhiên của Ủy ban nhân dân tỉnh.", ans: "Đ", exp: "Chấp hành nghị quyết của HĐND tỉnh là trách nhiệm đương nhiên của UBND tỉnh vì UBND là cơ quan chấp hành của HĐND." },
                { id: "6d", text: "d) Trong hoạt động của mình, Ủy ban nhân dân chịu trách nhiệm chấp hành nghị quyết của Hội đồng nhân dân cùng cấp.", ans: "Đ", exp: "Đây là vì Ủy ban nhân dân là cơ quan chấp hành của Hội đồng nhân dân." }
            ]
        },
        {
            q: "Câu 7:",
            ctx: "Hội đồng nhân dân họp mỗi năm ít nhất hai kì và họp chuyên đề hoặc họp để giải quyết công việc phát sinh đột xuất... Hội đồng nhân dân quyết định các vấn đề tại phiên họp toàn thể bằng hình thức biểu quyết.",
            items: [
                { id: "7a", text: "a) Hội đồng nhân dân chỉ hoạt động thông qua việc tổ chức phiên họp định kỳ, chuyên đề hoặc bất thường khi có công việc phát sinh đột xuất.", ans: "S", exp: "Ngoài các hoạt động này thì hoạt động của Thường trực và đại biểu hội đồng nhân dân cũng là hoạt động của Hội đồng nhân dân." },
                { id: "7b", text: "b) Phương thức quyết định các vấn đề trong phiên họp thông qua hình thức biểu quyết là phù hợp với nguyên tắc pháp chế trong tổ chức bộ máy nhà nước.", ans: "S", exp: "Đây là nguyên tắc tập trung dân chủ." },
                { id: "7c", text: "c) Đại biểu Hội đồng nhân dân là người thay mặt nhân dân quyết định các vấn đề của địa phương vì vậy cần giữ mối liên hệ với nhân dân.", ans: "Đ", exp: "Đại biểu Hội đồng nhân dân là người thay mặt nhân dân quyết định các vấn đề của địa phương vì vậy cần giữ mối liên hệ với nhân dân." },
                { id: "7d", text: "d) Chủ tịch Ủy ban nhân dân vừa là Đại biểu hội đồng nhân dân vừa là người đứng đầu cơ quan chấp hành của Hội đồng nhân dân.", ans: "Đ", exp: "Chủ tịch Ủy ban nhân dân phải là đại biểu hội đồng nhân dân cùng cấp, đồng thời là người đứng đầu ủy ban nhân dân cấp đó." }
            ]
        },
        {
            q: "Câu 8:",
            ctx: "Hiện nay, hệ thống an sinh xã hội đã được phát triển thành mạng lưới an sinh xã hội, không ngừng mở rộng diện bao phủ... đáp ứng các nhu cầu sinh hoạt tối thiểu của đại bộ phận người dân, đặc biệt là nhóm dân cư tại các vùng sâu, vùng xa...",
            items: [
                { id: "8a", text: "a) Thực hiện tốt mạng lưới an sinh xã hội sẽ là yếu tố quyết định đến việc thực hiện quyền con người ở Việt Nam.", ans: "Đ", exp: "Mạng lưới an sinh xã hội tốt sẽ góp phần thúc đẩy việc thực hiện các quyền của con người." },
                { id: "8b", text: "b) Chính sách giải quyết việc làm ở nước ta góp phần thực hiện tốt quyền con người trên lĩnh vực kinh tế.", ans: "Đ", exp: "Chính sách giải quyết việc làm ở nước ta góp phần thực hiện tốt quyền con người trên lĩnh vực kinh tế." },
                { id: "8c", text: "c) Hoàn thiện chính sách bảo hiểm xã hội toàn dân không góp phần thực hiện quyền con người trên lĩnh vực chính trị.", ans: "S", exp: "Hoàn thiện chính sách bảo hiểm xã hội toàn dân góp phần thực hiện quyền con người trên lĩnh vực xã hội." },
                { id: "8d", text: "d) Việc người cao tuổi nếu không có lương hưu được nhà nước trợ cấp hàng tháng theo quy định không phải là thực hiện quyền con người.", ans: "S", exp: "Việc người cao tuổi nếu không có lương hưu được nhà nước trợ cấp hàng tháng theo quy định chính là tạo điều kiện để thực hiện quyền con người." }
            ]
        },
        {
            q: "Câu 9:",
            ctx: "Nhà nước có chính sách học phí và học bổng, bảo đảm học sinh giỏi được tạo điều kiện tốt nhất cho việc học và phát triển tài năng... Mọi công dân trong độ tuổi quy định có nghĩa vụ học tập để thực hiện phổ cập giáo dục và hoàn thành giáo dục bắt buộc.",
            items: [
                { id: "9a", text: "a) Không thu học phí đối với bậc tiểu học là biện pháp để thực hiện quan điểm giáo dục tiểu học là bắt buộc đối với mọi công dân.", ans: "Đ", exp: "Không thu học phí để tạo điều kiện mọi công dân trong độ tuổi đi học đều được đến trường." },
                { id: "9b", text: "b) Việc thực hiện phổ cập giáo dục góp phần thực hiện mục tiêu mà Hiến pháp 2013 đặt ra là đào tạo nhân tài.", ans: "S", exp: "Việc thực hiện phổ cập giáo dục góp phần thực hiện mục tiêu mà Hiến pháp 2013 đặt ra là nâng cao dân trí." },
                { id: "9c", text: "c) Chính sách học phí và học bổng là công cụ quan trọng để thực hiện bình đẳng trong giáo dục ở nước ta.", ans: "Đ", exp: "Chính sách học phí và học bổng là công cụ quan trọng để thực hiện bình đẳng trong giáo dục ở nước ta, hỗ trợ những đối tượng yếu thế trong xã hội." },
                { id: "9d", text: "d) Thực hiện tốt chính sách giáo dục chính là góp phần thực hiện quyền con người trên thực tế.", ans: "Đ", exp: "Thực hiện tốt chính sách giáo dục chính là góp phần thực hiện quyền con người trên thực tế." }
            ]
        },
        {
            q: "Câu 10:",
            ctx: "Nền hành chính nhà nước có vị trí, vai trò hết sức quan trọng. Ðiều này được thể hiện cụ thể ở chỗ: Nó là bộ phận lớn nhất trong hệ thống từ Trung ương đến cơ sở. Là hệ thống trực tiếp thực hiện các đường lối của Ðảng, chính sách, pháp luật của Nhà nước...",
            items: [
                { id: "10a", text: "a) Chính phủ là cơ quan đóng vai trò quan trọng trong nền hành chính nhà nước Cộng hòa xã hội chủ nghĩa Việt Nam.", ans: "Đ", exp: "Chính phủ chính là cơ quan hành pháp nên đóng vai trò quan trọng trong nền hành chính nhà nước." },
                { id: "10b", text: "b) Ủy ban nhân dân các cấp không nằm trong nền hành chính nhà nước Cộng hòa xã hội chủ nghĩa Việt Nam.", ans: "S", exp: "Ủy ban nhân dân các cấp là cơ quan hành chính ở địa phương nên giữ vai trò chủ đạo trong nền hành chính nhà nước ở cơ sở." },
                { id: "10c", text: "c) Hiện nay chính phủ đang xây dựng mô hình chính phủ điện tử, đây là một trong những giải pháp để cải cách nền hành chính nhà nước.", ans: "Đ", exp: "Hiện nay chính phủ đang xây dựng mô hình chính phủ điện tử, đây là một trong những giải pháp để cải cách nền hành chính nhà nước." },
                { id: "10d", text: "d) Hoạt động của nền hành chính sẽ tác động lại các cơ quan lập pháp để từ đó có những điều chỉnh về mặt lập pháp cho phù hợp thực tiễn.", ans: "Đ", exp: "Hoạt động của nền hành chính sẽ tác động lại các cơ quan lập pháp để từ đó có những điều chỉnh về mặt lập pháp cho phù hợp thực tiễn." }
            ]
        }
    ];

    function renderQuiz() {
        const list = document.getElementById('questions-list');
        quizData.forEach((group) => {
            let html = `<div class="question">
                            <div class="question-title">${group.q}</div>
                            ${group.ctx ? `<div class="context-text">${group.ctx}</div>` : ''}`;
            group.items.forEach(item => {
                html += `
                    <div class="option-group">
                        <p class="option-text">${item.text}</p>
                        <div class="radio-labels">
                            <label><input type="radio" name="${item.id}" value="Đ"> Đúng</label>
                            <label><input type="radio" name="${item.id}" value="S"> Sai</label>
                        </div>
                        <span class="result-msg" id="msg-${item.id}"></span>
                    </div>`;
            });
            html += `</div>`;
            list.innerHTML += html;
        });
    }

    function calculateScore() {
        let score = 0;
        let total = 0;
        quizData.forEach(group => {
            group.items.forEach(item => {
                total++;
                const selected = document.querySelector(`input[name="${item.id}"]:checked`);
                const msg = document.getElementById(`msg-${item.id}`);
                msg.style.display = 'block';
                
                let expHtml = item.exp ? `<span class="explanation"><strong>Giải thích:</strong> ${item.exp}</span>` : "";

                if (!selected) {
                    msg.innerHTML = `⚠️ Bạn chưa chọn đáp án! (Đáp án đúng: ${item.ans}) ${expHtml}`;
                    msg.className = "result-msg incorrect";
                    return;
                }

                if (selected.value === item.ans) {
                    score++;
                    msg.innerHTML = `✓ Chính xác! ${expHtml}`;
                    msg.className = "result-msg correct";
                } else {
                    msg.innerHTML = `✗ Sai (Đáp án đúng: ${item.ans}) ${expHtml}`;
                    msg.className = "result-msg incorrect";
                }
            });
        });
        
        const display = document.getElementById('score-display');
        display.style.display = 'block';
        display.innerHTML = `Điểm của bạn: ${score} / ${total} ý đúng`;
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    // Khởi tạo form khi tải trang
    renderQuiz();
</script>
